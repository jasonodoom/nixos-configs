# Build each host and push its novel store paths to the Vega cache (tenant tier).
# SEPARATE from ci.yml and triggered ONLY on push / manual dispatch, never on
# pull_request: the OIDC signing credential (id-token) must not exist on a run
# that builds untrusted PR code (an --impure eval could read the token env).
name: Cache to Vega
on:
  push:
    branches: [ main, unstable ]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
concurrency:
  group: vega-cache-${{ github.ref }}
  cancel-in-progress: false
jobs:
  cache:
    runs-on: ${{ matrix.runner }}
    # The job timeout is the single source of truth for "too long" (the agent's
    # own VEGA_BUILD_TIMEOUT_MS is set high below so it never pre-empts this).
    # Raised to fit one cold build of a heavy closure on the free hosted runner;
    # reuse-cache substitutes it on later runs.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # perdurabo builds on its own self-hosted Vega runner (a persistent
          # container that already ships nix + the agent), not a free GitHub
          # runner, so the heavy desktop closure is not subject to preemption.
          - host: framework-desktop
            attr: nixosConfigurations.perdurabo.config.system.build.toplevel
            runner: [ self-hosted, vega-perdurabo ]
            selfhosted: true
          - host: lenovo-thinkcentre-m710q
            attr: nixosConfigurations.congo.config.system.build.toplevel
            runner: ubuntu-latest
            os: ubuntu-latest
          - host: apple-macbook-air-m2
            attr: darwinConfigurations.theophany.system
            runner: macos-14
            os: macos-14
    # NAR dumps + nix build temp go to /mnt on ubuntu (the small / disk is why
    # ci.yml relocates /nix to /mnt). macOS and the self-hosted container have room
    # on /tmp. (The runner context is not available in job-level env, use a literal.)
    env:
      TMPDIR: ${{ matrix.os == 'ubuntu-latest' && '/mnt/vega-tmp' || '/tmp' }}
      # Defer to the job timeout-minutes above (6h ceiling); the agent must not
      # SIGTERM a long build before the job does and discard all built paths.
      VEGA_BUILD_TIMEOUT_MS: "21600000"
    steps:
      # Host prep only for the ephemeral GitHub-hosted ubuntu runner (congo), not
      # the macOS or self-hosted container runners.
      - name: Make /mnt scratch (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo mkdir -p /mnt/nix /nix /mnt/vega-tmp
          sudo mount --bind /mnt/nix /nix
          sudo chown "$(id -u):$(id -g)" /mnt/vega-tmp
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        if: matrix.os == 'ubuntu-latest'
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Hosted runners (congo, theophany): the action installs Nix, builds the
      # installable, and pushes only paths the upstream cache does not already serve.
      - name: Build and publish (hosted runner)
        if: ${{ !matrix.selfhosted }}
        uses: Ad-Astra-Computing/vega-agent/agent@a7f28d9e5adb939b99ebf53bdfd6132d9f7d0291 # v0.4.3
        with:
          installable: "${{ github.workspace }}/${{ matrix.host }}#${{ matrix.attr }}"
          control-plane: https://vega-cache.dev
          skip-upstream: "true"
          # Substitute this repo's own prior Vega pushes before building, so a cold
          # runner pulls cached paths instead of rebuilding. Safe here: tenant-cache
          # jobs, not shared-tier reproducers.
          reuse-cache: "true"

      # The self-hosted container builds with sandboxing off, so Nix uses
      # /homeless-shelter as $HOME and refuses to start if a prior build left it
      # behind. Clear it first so a leftover cannot fail the job.
      - name: Clear leftover non-sandbox build home (self-hosted)
        if: ${{ matrix.selfhosted }}
        run: rm -rf /homeless-shelter || sudo rm -rf /homeless-shelter

      # Self-hosted runner (perdurabo): the container already ships nix + the agent,
      # so call the baked agent directly rather than the install-everything action
      # (which would re-run a systemd-based Nix installer the container lacks).
      - name: Build and publish (self-hosted, baked agent)
        if: ${{ matrix.selfhosted }}
        run: vega-attest "${{ github.workspace }}/${{ matrix.host }}#${{ matrix.attr }}"
        env:
          VEGA_URL: https://vega-cache.dev
          VEGA_SKIP_UPSTREAM: "true"
          VEGA_REUSE_CACHE: "true"
          # The agent streams each NAR from disk (v0.4.x), so concurrency no
          # longer buffers whole NARs in memory. Raise it from the OOM-era 1 to
          # speed the push of this heavy closure.
          VEGA_UPLOAD_CONCURRENCY: "4"
