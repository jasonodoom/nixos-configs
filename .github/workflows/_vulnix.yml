name: Vulnix scan (reusable)

on:
  workflow_call:
    inputs:
      host_dir:
        description: "Path to the host directory containing flake.nix"
        required: true
        type: string
      host_name:
        description: "nixosConfigurations attribute name (e.g. perdurabo)"
        required: true
        type: string
      pr_number:
        description: "Pull request number to comment on, if any"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          source-tag: "v3.12.1"
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org/ https://odoom-nixos-configs.cachix.org https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= odoom-nixos-configs.cachix.org-1:ySk5iYiHKvbuE1FezCjusvvFR98rkXDLMM6bS8SH3SU= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      - name: Build system closure
        id: build
        working-directory: ${{ inputs.host_dir }}
        env:
          HOST_NAME: ${{ inputs.host_name }}
        run: |
          set -eu
          OUT=$(nix build --no-link --print-out-paths \
            ".#nixosConfigurations.${HOST_NAME}.config.system.build.toplevel")
          echo "toplevel=$OUT" >> "$GITHUB_OUTPUT"

      - name: Run vulnix
        id: vulnix
        run: |
          set +e
          nix run nixpkgs#vulnix -- --json "${TOPLEVEL}" > vulnix.json
          rc=$?
          set -e
          # vulnix exits 0 when clean, 2 when CVEs found, other on error
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "vulnix failed with exit $rc"
            cat vulnix.json || true
            exit "$rc"
          fi
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          jq 'length' vulnix.json
        env:
          TOPLEVEL: ${{ steps.build.outputs.toplevel }}

      - name: Enrich findings via vulnpatch.dev
        if: steps.vulnix.outputs.rc == '2'
        env:
          HOST_NAME: ${{ inputs.host_name }}
          HOST_DIR: ${{ inputs.host_dir }}
        run: |
          set -eu
          : > findings.md
          echo "## Vulnix findings for ${HOST_NAME} (${HOST_DIR})" >> findings.md
          echo >> findings.md
          jq -c '.[]' vulnix.json | while read -r row; do
            pkg=$(echo "$row" | jq -r '.name // .pname // "unknown"')
            ver=$(echo "$row" | jq -r '.version // ""')
            cves=$(echo "$row" | jq -r '.affected_by[]? // .cves[]? // empty' | sort -u)
            if [ -z "$cves" ]; then
              continue
            fi
            cve_count=$(echo "$cves" | wc -l | tr -d ' ')
            echo "<details>" >> findings.md
            echo "<summary><code>$pkg</code> $ver — $cve_count CVE(s)</summary>" >> findings.md
            echo >> findings.md
            for cve in $cves; do
              meta=$(curl -fsSL --max-time 10 \
                "https://api.vulnpatch.dev/api/v1/cve/${cve}" \
                2>/dev/null || echo '{}')
              sev=$(echo "$meta" | jq -r '.data.primary.severity // "unknown"' 2>/dev/null || echo unknown)
              cvss=$(echo "$meta" | jq -r '.data.primary.cvssScore // "n/a"' 2>/dev/null || echo n/a)
              epss=$(echo "$meta" | jq -r 'if (.data.epss|type)=="object" then (.data.epss.score // "n/a") elif (.data.epss|type)=="number" then .data.epss else "n/a" end' 2>/dev/null || echo n/a)
              kev=$(echo "$meta" | jq -r 'if (.data.kev|type)=="object" then true elif (.data.kev|type)=="boolean" then .data.kev else false end' 2>/dev/null || echo false)
              line="- [$cve](https://nvd.nist.gov/vuln/detail/$cve) — severity: $sev, CVSS: $cvss, EPSS: $epss"
              if [ "$kev" = "true" ]; then
                line="$line, **KEV-listed**"
              fi
              echo "$line" >> findings.md
            done
            # Repology check is best-effort; skip silently on failure or timeout.
            repo=$(curl -fsSL --max-time 5 \
              "https://api.vulnpatch.dev/api/v1/nix/repology/${pkg}" \
              2>/dev/null || true)
            if [ -n "$repo" ]; then
              chans=$(echo "$repo" | jq -r '.. | objects | select(has("repo") and has("version")) | "  - \(.repo): \(.version)"' 2>/dev/null | sort -u | head -20 || true)
              if [ -n "$chans" ]; then
                echo >> findings.md
                echo "  Channel availability:" >> findings.md
                echo "$chans" >> findings.md
              fi
            fi
            echo >> findings.md
            echo "</details>" >> findings.md
            echo >> findings.md
          done

      - name: Upload findings artifact
        if: steps.vulnix.outputs.rc == '2'
        uses: actions/upload-artifact@v7
        with:
          name: vulnix-${{ inputs.host_name }}
          path: |
            vulnix.json
            findings.md

      - name: Truncate findings for GitHub body limit
        if: steps.vulnix.outputs.rc == '2'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          # GitHub caps issue/PR body length at 65536 characters; leave headroom
          # for the truncation footer.
          MAX=64000
          SIZE=$(wc -c < findings.md | tr -d ' ')
          if [ "$SIZE" -le "$MAX" ]; then
            cp findings.md findings-body.md
            exit 0
          fi
          # Cut at the last </details> boundary inside the budget so we don't
          # leave an unclosed details block.
          head -c "$MAX" findings.md > findings-body.md
          LAST_END=$(grep -bo '</details>' findings-body.md | tail -1 | cut -d: -f1)
          if [ -n "$LAST_END" ]; then
            head -c "$((LAST_END + 10))" findings.md > findings-body.md
          fi
          {
            echo
            echo "---"
            echo
            echo "_Output truncated to fit GitHub's 65 KB body limit. Full report in the workflow run artifact: ${RUN_URL}_"
          } >> findings-body.md

      - name: Open or update tracking issue in private repo
        id: private_issue
        if: steps.vulnix.outputs.rc == '2'
        env:
          # PAT with issues:write on jasonodoom/nixos-vulnix-private.
          # GITHUB_TOKEN can't write cross-repo.
          GH_TOKEN: ${{ secrets.VULNIX_REPO_TOKEN }}
          HOST_NAME: ${{ inputs.host_name }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: jasonodoom/nixos-vulnix-private
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          # PR context gets its own issue per PR so reviewers see only
          # the CVEs introduced by that change. Scheduled scans share a
          # single host-scoped tracking issue.
          if [ -n "$PR_NUMBER" ]; then
            TITLE="vulnix: CVEs in PR #${PR_NUMBER} on ${HOST_NAME}"
            BACKREF="_Source: ${{ github.repository }} PR #${PR_NUMBER} — ${RUN_URL}_"
          else
            TITLE="vulnix: CVEs detected on ${HOST_NAME}"
            BACKREF="_Source: scheduled scan — ${RUN_URL}_"
          fi
          {
            echo "$BACKREF"
            echo
            cat findings-body.md
          } > issue-body.md
          gh label create security  --repo "$REPO" --color B60205 --description "Security-related issue" 2>/dev/null || true
          gh label create automated --repo "$REPO" --color BFD4F2 --description "Created by automation"  2>/dev/null || true
          EXISTING=$(gh issue list --repo "$REPO" --label security --state all \
            --search "in:title \"${TITLE}\"" \
            --json number,state --jq '.[0]')
          if [ -n "$EXISTING" ]; then
            NUM=$(echo "$EXISTING" | jq -r .number)
            STATE=$(echo "$EXISTING" | jq -r .state)
            if [ "$STATE" = "CLOSED" ]; then
              gh issue reopen "$NUM" --repo "$REPO"
            fi
            gh issue comment "$NUM" --repo "$REPO" --body-file issue-body.md
          else
            NUM=$(gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --body-file issue-body.md \
              --label security \
              --label automated \
              --assignee jasonodoom | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+')
          fi
          echo "issue_number=$NUM" >> "$GITHUB_OUTPUT"
          echo "issue_url=https://github.com/${REPO}/issues/$NUM" >> "$GITHUB_OUTPUT"

      - name: Pointer comment on public PR
        if: steps.vulnix.outputs.rc == '2' && inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HOST_NAME: ${{ inputs.host_name }}
          ISSUE_URL: ${{ steps.private_issue.outputs.issue_url }}
        run: |
          set -eu
          # Reviewer-facing pointer only — CVE details live in the
          # private repo to avoid publishing a full vulnerability map
          # of running infra on a public PR.
          BODY="vulnix found CVEs in this PR's closure for **${HOST_NAME}**. Details (private): ${ISSUE_URL}"
          gh pr comment "${PR_NUMBER}" --body "$BODY"
