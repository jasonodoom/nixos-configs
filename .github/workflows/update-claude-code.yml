name: Update Claude Code

on:
  schedule:
    # Every Friday at 3 PM UTC
    - cron: '0 15 * * 5'
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to update to (leave empty for latest)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GCS_BUCKET: https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: unstable

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          source-tag: "v3.12.1"
          extra-conf: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TARGET="${{ github.event.inputs.version }}"
          else
            TARGET=$(curl -fsSL "$GCS_BUCKET/latest")
          fi
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "Target version: ${TARGET}"

          THEOPHANY_CURRENT=$(grep -oP 'version = "\K[^"]+' apple-macbook-air-m2/overlays/claude-code.nix || echo "unknown")
          PERDURABO_CURRENT=$(grep -oP 'version = "\K[^"]+' framework-desktop/overlays/claude-code.nix || echo "unknown")
          CONGO_CURRENT=$(grep -oP 'version = "\K[^"]+' lenovo-thinkcentre-m710q/overlays/claude-code.nix || echo "unknown")
          echo "theophany_current=${THEOPHANY_CURRENT}" >> $GITHUB_OUTPUT
          echo "perdurabo_current=${PERDURABO_CURRENT}" >> $GITHUB_OUTPUT
          echo "congo_current=${CONGO_CURRENT}" >> $GITHUB_OUTPUT

          if [ "$THEOPHANY_CURRENT" = "$TARGET" ] && [ "$PERDURABO_CURRENT" = "$TARGET" ] && [ "$CONGO_CURRENT" = "$TARGET" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already on version ${TARGET}"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Check if PR already exists
        if: steps.version.outputs.needed == 'true'
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-claude-code-${{ steps.version.outputs.target }}"
          EXISTING=$(gh pr list --head "${BRANCH}" --state open --json number -q '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch manifest and compute hashes
        if: steps.version.outputs.needed == 'true' && steps.check-pr.outputs.exists != 'true'
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.target }}"
          MANIFEST=$(curl -fsSL "$GCS_BUCKET/$VERSION/manifest.json")

          # Extract checksums from manifest
          LINUX_X64_SHA256=$(echo "$MANIFEST" | jq -r '.platforms["linux-x64"].checksum')
          DARWIN_ARM64_SHA256=$(echo "$MANIFEST" | jq -r '.platforms["darwin-arm64"].checksum')

          # Convert hex to SRI format
          LINUX_X64_SRI=$(nix hash to-sri --type sha256 "$LINUX_X64_SHA256")
          DARWIN_ARM64_SRI=$(nix hash to-sri --type sha256 "$DARWIN_ARM64_SHA256")

          echo "linux_x64_hash=${LINUX_X64_SRI}" >> $GITHUB_OUTPUT
          echo "darwin_arm64_hash=${DARWIN_ARM64_SRI}" >> $GITHUB_OUTPUT
          echo "Linux x64: ${LINUX_X64_SRI}"
          echo "Darwin arm64: ${DARWIN_ARM64_SRI}"

      - name: Update overlays
        if: steps.version.outputs.needed == 'true' && steps.check-pr.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.version.outputs.target }}"
          LINUX_HASH="${{ steps.hashes.outputs.linux_x64_hash }}"
          DARWIN_HASH="${{ steps.hashes.outputs.darwin_arm64_hash }}"

          cat > framework-desktop/overlays/claude-code.nix << 'NIXEOF'
          # Claude Code overlay - native binary from Anthropic
          # Updated automatically by .github/workflows/update-claude-code.yml
          let
            version = "VERSION_PLACEHOLDER";
            platform = "linux-x64";
            hash = "HASH_PLACEHOLDER";
          in
          final: prev: {
            claude-code = final.stdenv.mkDerivation {
              pname = "claude-code";
              inherit version;
              src = final.fetchurl {
                url = "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${version}/${platform}/claude";
                inherit hash;
              };
              dontUnpack = true;
              # Ship the binary byte-for-byte. claude-code is a Bun single-file
              # executable with the JS payload appended after the ELF; any post-build
              # touching (autoPatchelfHook, strip, the default fixup patchelf pass)
              # shifts the trailer offset and Bun can't find the payload. nix-ld in
              # the guest supplies /lib64/ld-linux-x86-64.so.2 and libstdc++.
              dontStrip = true;
              dontPatchELF = true;
              installPhase = ''
                install -Dm755 $src $out/bin/claude
              '';
            };
          }
          NIXEOF
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" framework-desktop/overlays/claude-code.nix
          sed -i "s|HASH_PLACEHOLDER|${LINUX_HASH}|g" framework-desktop/overlays/claude-code.nix

          mkdir -p lenovo-thinkcentre-m710q/overlays
          cat > lenovo-thinkcentre-m710q/overlays/claude-code.nix << 'NIXEOF'
          # Claude Code overlay - native binary from Anthropic
          # Updated automatically by .github/workflows/update-claude-code.yml
          let
            version = "VERSION_PLACEHOLDER";
            platform = "linux-x64";
            hash = "HASH_PLACEHOLDER";
          in
          final: prev: {
            claude-code = final.stdenv.mkDerivation {
              pname = "claude-code";
              inherit version;
              src = final.fetchurl {
                url = "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${version}/${platform}/claude";
                inherit hash;
              };
              dontUnpack = true;
              # Ship the binary byte-for-byte. claude-code is a Bun single-file
              # executable with the JS payload appended after the ELF; any post-build
              # touching (autoPatchelfHook, strip, the default fixup patchelf pass)
              # shifts the trailer offset and Bun can't find the payload. nix-ld in
              # the guest supplies /lib64/ld-linux-x86-64.so.2 and libstdc++.
              dontStrip = true;
              dontPatchELF = true;
              installPhase = ''
                install -Dm755 $src $out/bin/claude
              '';
            };
          }
          NIXEOF
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" lenovo-thinkcentre-m710q/overlays/claude-code.nix
          sed -i "s|HASH_PLACEHOLDER|${LINUX_HASH}|g" lenovo-thinkcentre-m710q/overlays/claude-code.nix

          cat > apple-macbook-air-m2/overlays/claude-code.nix << 'NIXEOF'
          # Claude Code overlay - native binary from Anthropic
          # Updated automatically by .github/workflows/update-claude-code.yml
          let
            version = "VERSION_PLACEHOLDER";
            platform = "darwin-arm64";
            hash = "HASH_PLACEHOLDER";
          in
          final: prev: {
            claude-code = final.stdenv.mkDerivation {
              pname = "claude-code";
              inherit version;
              src = final.fetchurl {
                url = "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases/${version}/${platform}/claude";
                inherit hash;
              };
              dontUnpack = true;
              installPhase = ''
                install -Dm755 $src $out/bin/claude
              '';
            };
          }
          NIXEOF
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" apple-macbook-air-m2/overlays/claude-code.nix
          sed -i "s|HASH_PLACEHOLDER|${DARWIN_HASH}|g" apple-macbook-air-m2/overlays/claude-code.nix

      - name: Create branch, commit, and PR
        if: steps.version.outputs.needed == 'true' && steps.check-pr.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.target }}"
          BRANCH="update-claude-code-${VERSION}"

          git fetch origin
          BASE_OID="$(git rev-parse origin/unstable)"

          # Drop any leftover branch from an earlier failed run, then
          # create a fresh ref pointing at unstable HEAD via the API.
          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}" || true
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="${BASE_OID}" >/dev/null

          # Commit via the createCommitOnBranch GraphQL mutation, NOT
          # via `git commit && git push`. Commits made through the
          # GitHub API with GITHUB_TOKEN are signed by GitHub on
          # behalf of github-actions[bot] (Verified badge). The
          # previous `git commit` path produced unsigned commits
          # that perdurabo's auto-upgrade signature check refused —
          # see issue #432.
          INPUT=$(jq -n \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg branch "${BRANCH}" \
            --arg msg "Update Claude Code to ${VERSION}" \
            --arg oid "${BASE_OID}" \
            --rawfile fwd framework-desktop/overlays/claude-code.nix \
            --rawfile mac apple-macbook-air-m2/overlays/claude-code.nix \
            --rawfile lnv lenovo-thinkcentre-m710q/overlays/claude-code.nix \
            '{
              branch: { repositoryNameWithOwner: $repo, branchName: $branch },
              message: { headline: $msg },
              expectedHeadOid: $oid,
              fileChanges: {
                additions: [
                  { path: "framework-desktop/overlays/claude-code.nix",       contents: ($fwd | @base64) },
                  { path: "apple-macbook-air-m2/overlays/claude-code.nix",    contents: ($mac | @base64) },
                  { path: "lenovo-thinkcentre-m710q/overlays/claude-code.nix", contents: ($lnv | @base64) }
                ]
              }
            }')

          gh api graphql \
            -f query='mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url oid } } }' \
            -F input="${INPUT}" >/dev/null

          gh pr create \
            --title "Update Claude Code to ${VERSION}" \
            --body "$(cat <<EOF
          Automated update of Claude Code to ${VERSION} using native binary distribution.

          ## Changes
          - Updated overlay for perdurabo (linux-x64)
          - Updated overlay for theophany (darwin-arm64)

          ## Previous Versions
          - perdurabo: ${{ steps.version.outputs.perdurabo_current }}
          - theophany: ${{ steps.version.outputs.theophany_current }}

          ---
          This PR was automatically created by the [update-claude-code workflow](https://github.com/${{ github.repository }}/blob/unstable/.github/workflows/update-claude-code.yml).
          EOF
          )" \
            --base unstable \
            --head "${BRANCH}" \
            --label "dependencies" \
            --label "automated" \
            --assignee jasonodoom

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --state open --label "bug" --label "automated" --search "Claude Code update workflow failed" --json number -q '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Still failing.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Target:** ${{ steps.version.outputs.target }}"
          else
            gh issue create \
              --title "Claude Code update workflow failed" \
              --body "The automated Claude Code update workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Target:** ${{ steps.version.outputs.target }}

          Please check the workflow logs for details." \
              --label "bug" \
              --label "automated" \
              --assignee jasonodoom
          fi
