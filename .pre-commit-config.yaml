repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.gpg$|\.age$'
      - id: end-of-file-fixer
        exclude: '\.gpg$|\.age$'
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: nix-flake-check
        name: nix flake check (eval-only, per changed host)
        entry: .githooks/nix-flake-check.sh
        language: system
        pass_filenames: false
        files: '(framework-desktop|lenovo-thinkcentre-m710q|apple-macbook-air-m2|modules)/.*\.(nix|lock)$'
