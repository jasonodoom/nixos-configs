title = "nixos-configs gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Paths and patterns that legitimately contain high-entropy strings"

paths = [
  '''.*\.age$''',
  '''.*/secrets\.nix$''',
  '''.*/flake\.lock$''',
]

regexes = [
  '''ssh-(ed25519|rsa|ecdsa|dss) [A-Za-z0-9+/=]+ [^\n]*''',
  '''-----BEGIN AGE ENCRYPTED FILE-----''',
  '''tskey-auth-YOUR-KEY-HERE''',
]
